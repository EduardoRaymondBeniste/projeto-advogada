<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A843;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F0D78C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8942E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1F3F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#132E5C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A843;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8942E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Círculo externo -->
  <circle cx="250" cy="250" r="230" fill="url(#navyGrad)" stroke="url(#goldGrad)" stroke-width="6"/>

  <!-- Anel dourado interno -->
  <circle cx="250" cy="250" r="210" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- Balança da Justiça estilizada -->
  <g transform="translate(250, 135)" stroke="url(#goldGrad)" stroke-width="4.5" fill="none" stroke-linecap="round">
    <!-- Haste central -->
    <line x1="0" y1="0" x2="0" y2="100"/>
    <!-- Braço horizontal -->
    <line x1="-95" y1="30" x2="95" y2="30"/>
    <!-- Prato esquerdo -->
    <path d="M-95,30 C-95,70 -65,80 -55,70 C-55,60 -75,55 -85,30" stroke-width="3"/>
    <!-- Prato direito -->
    <path d="M95,30 C95,70 65,80 55,70 C55,60 75,55 85,30" stroke-width="3"/>
    <!-- Base -->
    <line x1="-35" y1="100" x2="35" y2="100" stroke-width="5"/>
    <line x1="-25" y1="100" x2="-35" y2="120" stroke-width="3"/>
    <line x1="25" y1="100" x2="35" y2="120" stroke-width="3"/>
    <line x1="-35" y1="120" x2="35" y2="120" stroke-width="3"/>
  </g>

  <!-- Monograma DA -->
  <g transform="translate(250, 320)">
    <!-- Letra D -->
    <text x="-62" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="130" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" dominant-baseline="central">D</text>
    <!-- Letra A -->
    <text x="62" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="130" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" dominant-baseline="central">A</text>
    <!-- Ponto separador -->
    <circle cx="0" cy="0" r="8" fill="url(#goldGrad)"/>
  </g>

  <!-- Colunas laterais estilizadas -->
  <g transform="translate(250, 250)" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.3">
    <!-- Coluna esquerda -->
    <rect x="-195" y="-220" width="18" height="440" rx="9"/>
    <rect x="-195" y="-220" width="18" height="14" rx="3" fill="url(#goldGrad)" opacity="0.6"/>
    <rect x="-195" y="206" width="18" height="14" rx="3" fill="url(#goldGrad)" opacity="0.6"/>
    <!-- Coluna direita -->
    <rect x="177" y="-220" width="18" height="440" rx="9"/>
    <rect x="177" y="-220" width="18" height="14" rx="3" fill="url(#goldGrad)" opacity="0.6"/>
    <rect x="177" y="206" width="18" height="14" rx="3" fill="url(#goldGrad)" opacity="0.6"/>
  </g>
</svg>
